apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana-instance
  namespace: monitoring-system
  labels:
    dashboards: "grafana"
spec:
  dashboardLabelSelector:
    matchLabels:
      app: grafana  
  config:
    server:
      root_url: https://%(domain)s/ # Wichtig für korrekte Redirects
    log:
      mode: "console"
    auth.anonymous:
      enabled: "true"
      orgRole: "Admin"
---
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: grafana-ingress
    namespace: monitoring-system
    labels:
      app.kubernetes.io/name: grafana-ingress
  spec:
    rules:
    - host: grafana-web-monitoring-system.apps-crc.testing
      http:
        paths:
        - pathType: Prefix
          path: "/"
          backend:
            service:
              name: grafana
              port: 
                number: 3000
  