apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana-instance
  namespace: monitoring-system
  labels:
    dashboards: "grafana"
spec:
  serviceAccountName: grafana-monitoring-sa
  dashboardLabelSelector:
    matchLabels:
      dashboards: grafana  
  config:
    server:
      root_url: https://%(domain)s/ # Wichtig für korrekte Redirects
    log:
      mode: "console"
    auth.anonymous:
      enabled: "true"
      orgRole: "Admin"
  deployment:
    spec:
      template:
        spec:
          containers:
          - name: grafana
            env:           
            - name: SA_TOKEN_FILE
              value: "/var/run/secrets/kubernetes.io/serviceaccount/token"
---
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: grafana-ingress
    namespace: monitoring-system
    labels:
      app.kubernetes.io/name: grafana-ingress
  spec:
    rules:
    - host: grafana-web-monitoring-system.apps-crc.testing
      http:
        paths:
        - pathType: Prefix
          path: "/"
          backend:
            service:
              name: grafana-instance-service
              port: 
                number: 3000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-monitoring-sa
  namespace: monitoring-system
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-sa-token
  namespace: monitoring-system
  annotations:
    kubernetes.io/service-account.name: grafana-monitoring-sa
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-proxy-binding
  namespace: monitoring-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: grafana-monitoring-sa
  namespace: monitoring-system
---

  