apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: grafana-instance
  namespace: monitoring-system
  labels:
    dashboards: "grafana"
spec:
  serviceAccountName: grafana-monitoring-sa
  dashboardLabelSelector:
    matchLabels:
      dashboards: grafana  
  secrets:
    - grafana-sa-token
  config:
    server:
      root_url: https://%(domain)s/ # Wichtig für korrekte Redirects
    log:
      mode: "console"
    auth.anonymous:
      enabled: "true"
      orgRole: "Admin"
  deployment:
    spec:
      template:
        spec:
          containers:
          - name: grafana
            env:           
            - name: TOKEN
              valueFrom:
                secretKeyRef:
                  name: grafana-sa-token
                  key: token
---
  apiVersion: networking.k8s.io/v1
  kind: Ingress
  metadata:
    name: grafana-ingress
    namespace: monitoring-system
    labels:
      app.kubernetes.io/name: grafana-ingress
  spec:
    rules:
    - host: grafana-web-monitoring-system.apps-crc.testing
      http:
        paths:
        - pathType: Prefix
          path: "/"
          backend:
            service:
              name: grafana-instance-service
              port: 
                number: 3000
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: grafana-monitoring-sa
  namespace: monitoring-system
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-sa-token
  namespace: monitoring-system
  annotations:
    kubernetes.io/service-account.name: grafana-monitoring-sa
type: kubernetes.io/service-account-token
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: grafana-proxy-binding
  namespace: monitoring-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: view
subjects:
- kind: ServiceAccount
  name: grafana-monitoring-sa
  namespace: monitoring-system
---
apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaDatasource
metadata:
  name: cnpg-datasource
  namespace: monitoring-system
spec:
  instanceSelector:
    matchLabels:
      dashboards: "grafana"
  allowCrossNamespaceImport: true
  datasource:
    name: OpenShift-Prometheus
    type: prometheus
    access: proxy
    url: "https://thanos-querier.openshift-monitoring.svc.cluster.local:9091"
    isDefault: true
    jsonData:
      httpHeaderName1: 'Authorization'
      tlsSkipVerify: true     
      httpMethod: GET
    secureJsonData:
      httpHeaderValue1: 'Bearer ${token}'
  valuesFrom:
    - targetPath: secureJsonData.httpHeaderValue1
      valueFrom:
        secretKeyRef:
          name: grafana-sa-token
          key: token
---
  